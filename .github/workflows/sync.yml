name: Weekly Upstream Sync

on:
  schedule:
    - cron: "0 0 * * 0" # cada domingo
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git config merge.ours.driver true

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/adrianjael/pluggin-latino.git
          git fetch upstream

      - name: Sync upstream
        id: sync
        run: |
          if ! git merge upstream/main --no-edit; then
            git merge --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --quiet HEAD@{1} HEAD -- . ':!manifest.json'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on conflict
        if: steps.sync.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Upstream sync conflict";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-sync"
            });
            if (existing.data.some(issue => issue.title === title)) {
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: "Hubo un conflicto al sincronizar automáticamente el upstream (fuera de manifest.json). Revisión manual necesaria.",
              labels: ["upstream-sync"]
            });
